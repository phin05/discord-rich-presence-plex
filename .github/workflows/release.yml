name: Release
run-name: Release ${{ github.ref_name }}
on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    env:
      DOCKER_IMAGE_NAME: ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}
      IS_DEV_TAG: ${{ contains(github.ref_name, '-') }}
      SHORT_NAME: drpp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install dependencies
        run: make install-deps
      - name: Create dummy file for go:embed
        run: mkdir web/dist && touch web/dist/.dummy
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Build
        run: make build
      - name: Sign into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{raw}}
            type=raw,value=latest,enable=${{ env.IS_DEV_TAG == 'false' }}
      - name: Build and push Docker images
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/386,linux/arm/v7
          push: true
          provenance: false
          tags: ${{ steps.docker-meta.outputs.tags }}
          annotations: ${{ steps.docker-meta.outputs.annotations }}
      - name: Generate signed build provenance attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.DOCKER_IMAGE_NAME }}
          subject-digest: ${{ steps.docker-build.outputs.digest }}
      - name: Create release ZIP files
        run: |
          cd out
          for filename in *; do
            if [[ -d $filename ]]; then
              cd $filename
              zip -rm ../${{ env.SHORT_NAME }}-${{ github.ref_name }}-$filename.zip *
              cd ..
            fi
          done
      - name: Release on GitHub
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          draft: true
          prerelease: ${{ env.IS_DEV_TAG == 'true' }}
          files: out/*.zip
      - name: Generate signed build provenance attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: out/*.zip
